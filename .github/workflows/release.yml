name: Release

# Tag trigger disabled 2026-07-22 — the org NPM_TOKEN is broken, so every
# tag-driven publish fails and burns minutes. Releases are done locally
# (see workspace release script / release checklist). Restore the tag
# trigger when the token is rotated.
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Verify tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch — bump package.json to $TAG_VERSION before tagging."
            exit 1
          fi

      - name: Guard against dev-loop leakage
        run: |
          if node -p 'JSON.stringify(require("./package.json"))' | grep -qE '"(@diagrammo/dgmo|remark-dgmo)":\s*"(file:|link:)'; then
            echo "::error::package.json contains file:/link: deps. Swap to a published range before tagging."
            exit 1
          fi
          if node -p 'Object.keys(require("./package.json").pnpm ?? {}).join(",")' | grep -q overrides; then
            echo "::error::pnpm.overrides leaked into package.json."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build first so postbuild's dist/client.{css,js} check can gate publish.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Publish to npm
        # OIDC via npm Trusted Publishing (configured per-package on
        # npmjs.com). No stored token; provenance is attested automatically.
        run: npm publish --access public --provenance

      - name: Wait for npm propagation
        run: |
          for i in 1 2 3 4 5 6; do
            if npm view "vitepress-dgmo@${GITHUB_REF_NAME#v}" version >/dev/null 2>&1; then
              echo "✓ npm shows ${GITHUB_REF_NAME#v}"
              exit 0
            fi
            echo "Waiting for npm registry... ($i/6)"
            sleep 10
          done
          echo "::warning::npm did not surface the new version within 60s — proceeding anyway"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

name: Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE: /vitepress-dgmo/
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build wrapper
        run: pnpm build

      - name: Install fixture deps
        run: cd tests/fixture && pnpm install --no-frozen-lockfile

      - name: Compose showcase page (all chart types from dgmo-content)
        run: node scripts/compose-showcase.mjs tests/fixture/index.md

      - name: Build site
        run: cd tests/fixture && pnpm docs:build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: tests/fixture/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
